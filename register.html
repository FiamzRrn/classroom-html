<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Akun</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="ui.css">
    <style>
        .glass-input.form-control {
            color: var(--text-main) !important;
        }
        .glass-input.form-control::placeholder {
            color: var(--text-muted) !important;
        }
        .glass-input.form-control:focus {
            color: var(--text-main) !important;
            background-color: var(--glass-bg) !important;
        }
    </style>
</head>
<body class="dark" style="background-color: var(--bg-color);">
    <div id="bg-image"></div>
    <div id="cursor-glow"></div>

    <div class="min-vh-100 d-flex align-items-center justify-content-center position-relative">
        <div class="glass-panel text-center p-4 p-md-5 rounded-5" style="max-width: 450px; width: 90%; z-index: 10;">
            <h2 class="fw-bold mb-1" style="color: var(--text-main);">Daftar Baru</h2>
            <p class="text-uppercase text-secondary mb-4" style="letter-spacing: 2px; font-size: 0.8rem;">Bikin akun buat akses jadwal</p>
            
            <div class="mb-3">
                <input type="text" id="reg-username" class="glass-input form-control form-control-lg text-center rounded-4 border-0 shadow-none" placeholder="Username (Contoh: BudiTI)" style="cursor: text;">
            </div>
            <div class="mb-4">
                <input type="password" id="reg-password" class="glass-input form-control form-control-lg text-center rounded-4 border-0 shadow-none" placeholder="Password" style="cursor: text;">
            </div>
            
            <button onclick="handleRegister()" class="btn btn-primary w-100 btn-lg rounded-4 border-0 py-3 fw-bold" style="background: linear-gradient(to right, #2563eb, #3b82f6);">Daftar Sekarang</button>
            
            <p class="mt-4 mb-0 text-secondary" style="font-size: 0.85rem;">
                Udah punya akun? <a href="login.html" style="color: var(--primary); text-decoration: none; font-weight: bold;">Login di sini</a>
            </p>
        </div>
    </div>

    <script src="auth.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
